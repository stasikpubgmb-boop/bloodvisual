name: 🩸 BLOODVISUAL MOD MAKER

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  bloodvisual-only:
    if: contains(github.event.issue.body, '@create') || contains(github.event.comment.body, '@create')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: 📥 Клонируем
        uses: actions/checkout@v4

      - name: ☕ Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Gemini
        run: pip install google-generativeai

      - name: 🧠 BloodVisual Генератор
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import base64
          import google.generativeai as genai
          
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('models/gemini-1.5-flash')
          
          # Получаем задачу от пользователя
          task = """${{ github.event.issue.body }}"""
          
          prompt = f"""
          ТЫ - Veron. Делаешь ТОЛЬКО BloodVisual мод для Minecraft 1.21.4 Fabric.
          НИЧЕГО ДРУГОГО НЕ ДЕЛАЙ. ТОЛЬКО НАШ МОД.
          
          Задача пользователя: {task}
          
          ВСЕГДА ИСПОЛЬЗУЙ ЭТИ ИМПОРТЫ:
          
          BloodVisual.java:
          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerLifecycleEvents;
          import net.minecraft.util.Identifier;
          import org.slf4j.Logger;
          import org.slf4j.LoggerFactory;
          
          BloodVisualClient.java:
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.keybinding.v1.KeyBindingHelper;
          import net.fabricmc.fabric.api.client.rendering.v1.HudRenderCallback;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.client.option.KeyBinding;
          import net.minecraft.client.util.InputUtil;
          import org.lwjgl.glfw.GLFW;
          
          BloodOverlay.java:
          import net.fabricmc.fabric.api.client.rendering.v1.HudRenderCallback;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.client.gui.DrawContext;
          import net.minecraft.util.Identifier;
          import com.mojang.blaze3d.systems.RenderSystem;
          import com.veron.bloodvisual.BloodVisual;
          
          BloodParticles.java:
          import net.fabricmc.fabric.api.client.particle.v1.ParticleFactoryRegistry;
          import net.fabricmc.fabric.api.event.client.player.ClientPlayerBlockBreakEvents;
          import net.minecraft.client.particle.*;
          import net.minecraft.particle.SimpleParticleType;
          import net.minecraft.world.World;
          
          BloodMenu.java:
          import net.minecraft.client.gui.screen.Screen;
          import net.minecraft.client.gui.widget.ButtonWidget;
          import net.minecraft.client.gui.widget.SliderWidget;
          import net.minecraft.text.Text;
          import net.minecraft.util.Identifier;
          
          BloodConfig.java:
          import net.fabricmc.loader.api.FabricLoader;
          import com.google.gson.Gson;
          import com.google.gson.GsonBuilder;
          import java.io.File;
          import java.io.FileReader;
          import java.io.FileWriter;
          
          RenderHelper.java:
          import net.minecraft.client.render.*;
          import net.minecraft.client.util.math.MatrixStack;
          import org.joml.Matrix4f;
          
          Keybinds.java:
          import net.fabricmc.fabric.api.client.keybinding.v1.KeyBindingHelper;
          import net.minecraft.client.option.KeyBinding;
          import net.minecraft.client.util.InputUtil;
          import org.lwjgl.glfw.GLFW;
          
          ВСЕГДА ИСПОЛЬЗУЙ ЭТИ НАЗВАНИЯ:
          - Пакет: com.veron.bloodvisual
          - Mod ID: bloodvisual
          - Автор: Veron
          - Название: BloodVisual
          
          Структура папок ТОЛЬКО:
          src/main/java/com/veron/bloodvisual/
          src/main/java/com/veron/bloodvisual/client/
          src/main/java/com/veron/bloodvisual/ui/
          src/main/java/com/veron/bloodvisual/config/
          src/main/java/com/veron/bloodvisual/registry/
          src/main/java/com/veron/bloodvisual/utils/
          src/main/resources/assets/bloodvisual/textures/hud/
          src/main/resources/assets/bloodvisual/textures/ui/
          src/main/resources/assets/bloodvisual/textures/particles/
          src/main/resources/assets/bloodvisual/lang/
          src/main/resources/assets/bloodvisual/sounds/
          
          Теперь выполни задачу пользователя, создавая ТОЛЬКО файлы BloodVisual мода.
          Используй ТОЛЬКО указанные импорты.
          Названия классов ТОЛЬКО с Blood префиксом.
          
          Ответь Python кодом, который создаст нужные файлы.
          """
          
          response = model.generate_content(prompt)
          
          # Создаем базовые папки
          os.makedirs("src/main/java/com/veron/bloodvisual/client", exist_ok=True)
          os.makedirs("src/main/java/com/veron/bloodvisual/ui", exist_ok=True)
          os.makedirs("src/main/java/com/veron/bloodvisual/config", exist_ok=True)
          os.makedirs("src/main/java/com/veron/bloodvisual/registry", exist_ok=True)
          os.makedirs("src/main/java/com/veron/bloodvisual/utils", exist_ok=True)
          os.makedirs("src/main/resources/assets/bloodvisual/textures/hud", exist_ok=True)
          os.makedirs("src/main/resources/assets/bloodvisual/textures/ui", exist_ok=True)
          os.makedirs("src/main/resources/assets/bloodvisual/textures/particles", exist_ok=True)
          os.makedirs("src/main/resources/assets/bloodvisual/lang", exist_ok=True)
          os.makedirs("src/main/resources/assets/bloodvisual/sounds", exist_ok=True)
          
          # Выполняем генерацию
          exec(response.text)
          
          # Если не создался fabric.mod.json - создаем сами
          if not os.path.exists("src/main/resources/fabric.mod.json"):
              with open("src/main/resources/fabric.mod.json", "w") as f:
                  f.write('''{
  "schemaVersion": 1,
  "id": "bloodvisual",
  "version": "1.0.0",
  "name": "BloodVisual",
  "description": "Visual blood effects mod by Veron",
  "authors": ["Veron"],
  "contact": {},
  "license": "MIT",
  "icon": "assets/bloodvisual/icon.png",
  "environment": "*",
  "entrypoints": {
    "main": ["com.veron.bloodvisual.BloodVisual"],
    "client": ["com.veron.bloodvisual.BloodVisualClient"]
  },
  "depends": {
    "fabricloader": ">=0.15.0",
    "minecraft": "1.21.4",
    "java": ">=21",
    "fabric-api": "*"
  }
}''')
          
          print("✅ BloodVisual mod created by Veron!")
          EOF

      - name: 📦 Push
        run: |
          git config --global user.name 'Veron'
          git config --global user.email 'veron@bloodvisual.ru'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🩸 BloodVisual update"
          git push

      - name: 💬 Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🩸 **BloodVisual - Готово!**\n\n' +
                    'Автор: Veron\n' +
                    'Версия: 1.21.4 Fabric\n' +
                    'Пакет: com.veron.bloodvisual\n\n' +
                    '📁 Все файлы созданы с нашими импортами\n' +
                    '🔧 Что дальше: пиши @create и задачу'
            })
