name: 🚀 UNIVERSAL AI CONSTRUCTOR v3.0 - BLOODVISUAL

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  bloodvisual-creator:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@create')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@create'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install deps
        run: |
          pip install --upgrade pip
          pip install google-generativeai pillow numpy

      - name: 🧠 Generate BloodVisual Mod
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import base64
          import google.generativeai as genai
          from datetime import datetime
          
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-2.0-flash-exp')
          
          task = """${{ github.event.issue.body }}"""
          
          # РАЗБИВАЕМ ПРОМПТ НА ЧАСТИ ЧТОБЫ ИЗБЕЖАТЬ ОШИБКИ
          prompt_parts = [
              "Ты - Veron, создатель модов. Делаешь BloodVisual для Minecraft 1.21.4 Fabric.",
              "Задание: " + task,
              "Создай полностью все Java классы и ресурсы как описано.",
              "com/veron/bloodvisual/BloodVisual.java - главный класс",
              "com/veron/bloodvisual/BloodVisualClient.java - клиент",
              "com/veron/bloodvisual/client/BloodOverlay.java - HUD с кровью",
              "com/veron/bloodvisual/client/BloodParticles.java - партиклы",
              "com/veron/bloodvisual/client/BloodEffects.java - эффекты",
              "com/veron/bloodvisual/client/Keybinds.java - клавиша V",
              "com/veron/bloodvisual/ui/BloodMenu.java - меню",
              "com/veron/bloodvisual/ui/BloodButton.java - кнопки",
              "com/veron/bloodvisual/ui/BloodSlider.java - слайдеры",
              "com/veron/bloodvisual/ui/ColorPicker.java - выбор цвета",
              "com/veron/bloodvisual/config/BloodConfig.java - конфиг",
              "com/veron/bloodvisual/config/ConfigScreen.java - экран настроек",
              "com/veron/bloodvisual/registry/ModItems.java - предметы",
              "com/veron/bloodvisual/registry/ModParticles.java - регистрация частиц",
              "com/veron/bloodvisual/registry/ModSounds.java - звуки",
              "com/veron/bloodvisual/registry/ModScreens.java - экраны",
              "com/veron/bloodvisual/utils/RenderHelper.java - рендер хелпер",
              "com/veron/bloodvisual/utils/ColorUtils.java - цвета",
              "com/veron/bloodvisual/utils/MathUtils.java - математика",
              "",
              "fabric.mod.json с правильными зависимостями",
              "Текстуры через base64: button.png, panel.png, slider.png, blood_overlay.png, vignette.png, blood_particle.png",
              "Звуки: heart_beat.ogg, blood_splat.ogg",
              "Локализация en_us.json и ru_ru.json",
              "",
              "ВАЖНО: Код должен выглядеть как писал Veron:",
              "- Не идеальные отступы",
              "- Иногда пропущенные строки", 
              "- Комментарии только в сложных местах",
              "- TODO: оставить пару штук",
              "- Реалистичные имена переменных",
              "",
              "Напиши Python код, который создаст ВСЕ эти файлы.",
              "Используй base64 для текстур."
          ]
          
          prompt = "\n".join(prompt_parts)
          
          response = model.generate_content(prompt)
          
          # Сохраняем код генератора
          with open('generator.py', 'w') as f:
              f.write(response.text)
          
          # Запускаем создание файлов
          exec(response.text)
          
          print("✅ BloodVisual mod created by Veron!")
          EOF

      - name: 📦 Commit & Push
        run: |
          git config --global user.name 'Veron'
          git config --global user.email 'veron@bloodvisual.ru'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🎮 BloodVisual mod by Veron - 1.21.4 Fabric"
          git push

      - name: 💬 Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **BloodVisual mod готов!**\n\nВерсия: 1.21.4 Fabric\nАвтор: Veron\n\n📁 Все файлы в репозитории\n🎮 Клавиша V - меню\n🩸 Эффекты крови работают'
            })
