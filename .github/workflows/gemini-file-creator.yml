name: 🚀 UNIVERSAL AI CONSTRUCTOR v3.0 - BLOODVISUAL

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  bloodvisual-creator:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@create')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@create'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install deps
        run: |
          pip install --upgrade pip
          pip install google-generativeai pillow numpy

      - name: 🧠 Generate BloodVisual Mod
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import base64
          import google.generativeai as genai
          from datetime import datetime
          
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-2.0-flash-exp')
          
          task = """${{ github.event.issue.body }}"""
          
          prompt = f"""
          ТЫ - Veron, создатель модов. Делаешь BloodVisual для Minecraft 1.21.4 Fabric.
          
          Задание: {task}
          
          СОЗДАЙ ПОЛНОСТЬЮ:
          
          1. ВСЕ JAVA КЛАССЫ:
          
          com/veron/bloodvisual/BloodVisual.java:
          - Главный класс мода
          - Инициализация
          - Регистрация всего
          
          com/veron/bloodvisual/BloodVisualClient.java:
          - Клиентская часть
          - Рендер HUD
          - Партиклы
          
          com/veron/bloodvisual/client/BloodOverlay.java:
          - HUD с кровью на краях экрана
          - Эффект при низком здоровье
          
          com/veron/bloodvisual/client/BloodParticles.java:
          - Кровавые партиклы
          - Спавн при ударах
          
          com/veron/bloodvisual/client/BloodEffects.java:
          - Пост-эффекты
          - Затухание крови
          
          com/veron/bloodvisual/client/Keybinds.java:
          - Клавиша V для меню
          
          com/veron/bloodvisual/ui/BloodMenu.java:
          - Главное меню мода
          
          com/veron/bloodvisual/ui/BloodButton.java:
          - Кастомные кнопки
          
          com/veron/bloodvisual/ui/BloodSlider.java:
          - Слайдеры настроек
          
          com/veron/bloodvisual/ui/ColorPicker.java:
          - Выбор цвета крови
          
          com/veron/bloodvisual/config/BloodConfig.java:
          - Конфиг с настройками
          
          com/veron/bloodvisual/config/ConfigScreen.java:
          - Экран настроек
          
          com/veron/bloodvisual/registry/ModItems.java:
          - Регистрация предметов
          
          com/veron/bloodvisual/registry/ModParticles.java:
          - Регистрация партиклов
          
          com/veron/bloodvisual/registry/ModSounds.java:
          - Регистрация звуков
          
          com/veron/bloodvisual/registry/ModScreens.java:
          - Регистрация экранов
          
          com/veron/bloodvisual/utils/RenderHelper.java:
          - Хелперы для рендера
          
          com/veron/bloodvisual/utils/ColorUtils.java:
          - Работа с цветом
          
          com/veron/bloodvisual/utils/MathUtils.java:
          - Математика для эффектов
          
          2. fabric.mod.json:
          {{
            "schemaVersion": 1,
            "id": "bloodvisual",
            "version": "1.0.0",
            "name": "BloodVisual",
            "description": "Визуальные эффекты крови от Veron",
            "authors": ["Veron"],
            "contact": {{}},
            "license": "All Rights Reserved",
            "icon": "assets/bloodvisual/icon.png",
            "environment": "*",
            "entrypoints": {{
              "main": ["com.veron.bloodvisual.BloodVisual"],
              "client": ["com.veron.bloodvisual.BloodVisualClient"],
              "modmenu": ["com.veron.bloodvisual.config.ConfigScreen"]
            }},
            "depends": {{
              "fabricloader": ">=0.15.0",
              "minecraft": "1.21.4",
              "java": ">=21",
              "fabric-api": "*"
            }}
          }}
          
          3. ТЕКСТУРЫ (base64):
          - assets/bloodvisual/textures/ui/button.png
          - assets/bloodvisual/textures/ui/panel.png
          - assets/bloodvisual/textures/ui/slider.png
          - assets/bloodvisual/textures/hud/blood_overlay.png
          - assets/bloodvisual/textures/hud/vignette.png
          - assets/bloodvisual/textures/particles/blood_particle.png
          
          4. ЗВУКИ:
          - assets/bloodvisual/sounds/heart_beat.ogg (описание)
          - assets/bloodvisual/sounds/blood_splat.ogg (описание)
          
          5. ЛОКАЛИЗАЦИЯ:
          assets/bloodvisual/lang/en_us.json:
          {{
            "key.bloodvisual.open_menu": "Open BloodVisual Menu",
            "gui.bloodvisual.title": "BloodVisual Settings",
            "gui.bloodvisual.intensity": "Blood Intensity",
            "gui.bloodvisual.sounds": "Heartbeat Sounds",
            "gui.bloodvisual.color": "Blood Color"
          }}
          
          assets/bloodvisual/lang/ru_ru.json:
          {{
            "key.bloodvisual.open_menu": "Открыть меню BloodVisual",
            "gui.bloodvisual.title": "Настройки BloodVisual",
            "gui.bloodvisual.intensity": "Интенсивность крови",
            "gui.bloodvisual.sounds": "Звуки сердцебиения",
            "gui.bloodvisual.color": "Цвет крови"
          }}
          
          ВАЖНО: Код должен выглядеть как писал Veron:
          - Не идеальные отступы
          - Иногда пропущенные строки
          - Комментарии только в сложных местах
          - TODO: оставить пару штук
          - Реалистичные имена переменных
          
          Напиши Python код, который создаст ВСЕ эти файлы.
          Используй base64 для текстур.
          EOF
          
          response = model.generate_content(prompt)
          
          # Сохраняем код генератора
          with open('generator.py', 'w') as f:
              f.write(response.text)
          
          # Запускаем создание файлов
          exec(response.text)
          
          print("✅ BloodVisual mod created by Veron!")
          EOF

      - name: 📦 Commit & Push
        run: |
          git config --global user.name 'Veron'
          git config --global user.email 'veron@bloodvisual.ru'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🎮 BloodVisual mod by Veron - 1.21.4 Fabric"
          git push

      - name: 💬 Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **BloodVisual mod готов!**\n\nВерсия: 1.21.4 Fabric\nАвтор: Veron\n\n📁 Все файлы в репозитории\n🎮 Клавиша V - меню\n🩸 Эффекты крови работают'
            })
